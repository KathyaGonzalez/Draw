<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <h1>Draw in me</h1>
    <canvas id="pizarra" width= "500" height="500" ></canvas>
    <article>
        <section>
            <button id="limpiar">Limpiar</button>
        </section>
        <section>
            <span>Grosor lapiz</span>
            <input type="range" min="5" max="50" value="25" id="grosorLapiz">
        </section>
        <section>
            <span>Color</span>
            <input type="color" value="black" id="colorLapiz">
        </section>
        <section>
            <button id="descargarBtn">Descargar lienzo</button>
        </section>
        <section>
            <button id="borrador">
                Borrador
            </button>
        </section>
        <section>
            <button id="circulo">O</button>
        </section>
    </article>
    <script src="./index.js"></script>
</body>
</html>
